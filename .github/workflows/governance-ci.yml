name: governance-ci

on:
  pull_request:
  push:
    branches: [main, dev]
  workflow_call:

permissions:
  contents: read

env:
  CI: "true"

concurrency:
  group: governance-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  governance:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Install OPA and Conftest with checksum verification
        run: npm run tools:install

      - name: Verify OPA binary
        run: command -v .tools/bin/opa && .tools/bin/opa version

      - name: Verify Conftest binary
        run: command -v .tools/bin/conftest && .tools/bin/conftest --version

      - name: Run full CI test suite
        run: npm run test:ci
