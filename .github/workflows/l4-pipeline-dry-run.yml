name: L4 Pipeline Dry Run

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "src/l4/**"
      - "src/codex/**"
      - "schemas/**"
      - "fixtures/**"
      - "scripts/l4/**"
      - "test/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/l4-pipeline-dry-run.yml"

permissions:
  contents: read

jobs:
  l4-pipeline-dry-run:
    name: L4 pipeline dry-run
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build L4 dry-run input
        run: |
          mkdir -p artifacts/l4
          node scripts/l4/build-dry-run-input.mjs --out artifacts/l4/l4-pipeline-input.json

      - name: Run L4 pipeline CLI
        run: |
          node src/l4/l4-pipeline-cli.mjs \
            --input artifacts/l4/l4-pipeline-input.json \
            --out artifacts/l4/l4-run-result.json \
            --pipeline-out artifacts/l4/l4-pipeline-output.json

      - name: Build ChatGPT review invocation draft
        run: |
          node src/codex/bridge-cli.mjs \
            --request fixtures/codex-bridge-request/valid-review-bridge.json \
            --out artifacts/l4/codex-bridge-result.json \
            --result-id result-l4-dry-run-review-001 \
            --review-invocation-out artifacts/l4/chatgpt-review-invocation.json \
            --invocation-id invocation-l4-dry-run-review-001 \
            --created-at 2026-06-27T00:00:00.000Z

      - name: Build L4 dry-run artifact manifest
        run: |
          node scripts/l4/build-dry-run-artifact.mjs \
            --run-result artifacts/l4/l4-run-result.json \
            --out artifacts/l4/l4-dry-run-artifact.json

      - name: Validate L4 dry-run artifact manifest
        run: |
          node scripts/l4/validate-dry-run-artifact.mjs \
            --artifact artifacts/l4/l4-dry-run-artifact.json \
            --base-dir .

      - name: Write L4 dry-run summary
        run: |
          node scripts/l4/write-dry-run-summary.mjs \
            --artifact artifacts/l4/l4-dry-run-artifact.json \
            --run-result artifacts/l4/l4-run-result.json \
            --out "$GITHUB_STEP_SUMMARY"

      - name: Build L4 dry-run PR comment draft
        run: |
          node scripts/l4/write-dry-run-pr-comment.mjs \
            --artifact artifacts/l4/l4-dry-run-artifact.json \
            --run-result artifacts/l4/l4-run-result.json \
            --out artifacts/l4/l4-pr-comment.md

      - name: Verify L4 dry-run result
        run: |
          node -e "const fs=require('fs'); const r=JSON.parse(fs.readFileSync('artifacts/l4/l4-run-result.json','utf8')); const a=JSON.parse(fs.readFileSync('artifacts/l4/l4-dry-run-artifact.json','utf8')); const i=JSON.parse(fs.readFileSync('artifacts/l4/chatgpt-review-invocation.json','utf8')); if (r.status !== 'COMPLETED' || r.final_state !== 'ACCEPTED') { console.error(r); process.exit(1); } if (a.status !== r.status || a.final_state !== r.final_state) { console.error(a); process.exit(1); } if (i.reviewer !== 'chatgpt-baijin-reviewer') { console.error(i); process.exit(1); } if (!fs.existsSync('artifacts/l4/l4-pr-comment.md')) { console.error('missing l4-pr-comment.md'); process.exit(1); } console.log(JSON.stringify({ ok: true, status: r.status, final_state: r.final_state, artifact_id: a.artifact_id }));"

      - name: Upload L4 dry-run artifacts
        uses: actions/upload-artifact@v4
        with:
          name: l4-pipeline-dry-run
          path: artifacts/l4/
          if-no-files-found: error
